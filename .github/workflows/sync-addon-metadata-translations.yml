name: Sync addon metadata translations

on:
  push:
    branches: [main]
    paths:
      - '**addon.xml'
      - '**resource.language.**strings.po'
  workflow_dispatch:

jobs:
  sync-translations:
    if: github.repository == 'MikeSiLVO/skin.aeon.nox.silvo'
    permissions:
      contents: write
      pull-requests: write
    uses: MikeSiLVO/workflows/.github/workflows/sync-addon-metadata-translations.yml@v1
    secrets: inherit
